name: OCI Infra Pipeline

on:
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2  # Consider upgrading

      - name: Create terraform.tfvars with decoded secrets
        run: |
          echo "${{ secrets.TF_PRIVATE_KEY_B64 }}"    | base64 -d > oci_api_key.pem
          echo "${{ secrets.TF_OKE_SSH_KEY_B64 }}"     | base64 -d > oke_ssh_key.pub
          echo "${{ secrets.TF_VPN_SSH_KEY_B64 }}"     | base64 -d > vpn_ssh_key.pub
          echo "${{ secrets.TF_VPN_PRIVATE_KEY_B64 }}" | base64 -d > vpn_key.pem

          {
            echo 'tenancy_ocid         = "${{ secrets.TENANCY_OCID }}"'
            echo 'user_ocid            = "${{ secrets.USER_OCID }}"'
            echo 'region               = "${{ secrets.REGION }}"'
            echo 'availability_domain  = "${{ secrets.AVAILABILITY_DOMAIN }}"'
            echo 'fingerprint          = "${{ secrets.FINGERPRINT }}"'

            echo 'private_key = <<EOKEY'
            cat oci_api_key.pem
            echo 'EOKEY'

            echo 'compartment_ocid     = "${{ secrets.COMPARTMENT_OCID }}"'
            echo 'vcn_cidr_block       = "${{ secrets.VCN_CIDR_BLOCK }}"'
            echo 'oke_k8s_version      = "${{ secrets.OKE_K8S_VERSION }}"'

            echo 'oke_ssh_key = <<EOKEY'
            cat oke_ssh_key.pub
            echo 'EOKEY'

            echo 'vpn_ssh_key = <<EOKEY'
            cat vpn_ssh_key.pub
            echo 'EOKEY'

            echo 'vpn_private_key = <<EOKEY'
            cat vpn_key.pem
            echo 'EOKEY'

            echo 'vpn_instance_shape   = "${{ secrets.VPN_INSTANCE_SHAPE }}"'
            echo 'vpn_image_ocid       = "${{ secrets.VPN_IMAGE_OCID }}"'
            echo 'oke_node_shape       = "${{ secrets.OKE_NODE_SHAPE }}"'
            echo 'oke_image_ocid       = "${{ secrets.OKE_IMAGE_OCID }}"'
            echo 'budget_alert_email   = "${{ secrets.BUDGET_ALERT_EMAIL }}"'
          } > terraform.tfvars

      - name: Terraform Init
        env:
          TF_INPUT: false
        run: terraform init

      - name: Terraform Validate
        env:
          TF_INPUT: false
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_INPUT: false
        run: terraform plan -no-color -var-file="terraform.tfvars"

      - name: Terraform Apply
        env:
          TF_INPUT: false
        run: terraform apply -auto-approve -var-file="terraform.tfvars"

      - name: Cleanup decoded secrets
        run: rm -f oci_api_key.pem oke_ssh_key.pub vpn_ssh_key.pub vpn_key.pem terraform.tfvars