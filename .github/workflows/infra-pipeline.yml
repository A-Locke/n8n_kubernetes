name: OCI Infra Pipeline
permissions:
  contents: read
  id-token: write
  
on:
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.2  # Consider updating this

    - name: Create terraform.tfvars with decoded secrets
      run: |
        echo "${{ secrets.TF_PRIVATE_KEY_B64 }}"    | base64 -d > oci_api_key.pem
        echo "${{ secrets.TF_OKE_SSH_KEY_B64 }}"     | base64 -d > oke_ssh_key.pub
        echo "${{ secrets.TF_VPN_SSH_KEY_B64 }}"     | base64 -d > vpn_ssh_key.pub
        echo "${{ secrets.TF_VPN_PRIVATE_KEY_B64 }}" | base64 -d > vpn_key.pem

        {
        echo 'tenancy_ocid         = "${{ secrets.TF_TENANCY_OCID }}"'
        echo 'user_ocid            = "${{ secrets.TF_USER_OCID }}"'
        echo 'region               = "${{ secrets.TF_REGION }}"'
        echo 'availability_domain  = "${{ secrets.TF_AD }}"'
        echo 'fingerprint          = "${{ secrets.TF_FINGERPRINT }}"'
  
        echo 'private_key = <<EOKEY'
        cat oci_api_key.pem
        echo 'EOKEY'

        echo 'compartment_ocid     = "${{ secrets.TF_COMPARTMENT_OCID }}"'
        echo 'vcn_cidr_block       = "${{ secrets.TF_VCN_CIDR }}"'
        echo 'oke_k8s_version      = "${{ secrets.TF_OKE_VERSION }}"'

        echo 'oke_ssh_key = <<EOKEY'
        cat oke_ssh_key.pub
        echo 'EOKEY'

        echo 'vpn_ssh_key = <<EOKEY'
        cat vpn_ssh_key.pub
        echo 'EOKEY'

        echo 'vpn_private_key = <<EOKEY'
        cat vpn_key.pem
        echo 'EOKEY'

        echo 'vpn_instance_shape   = "${{ secrets.TF_VPN_SHAPE }}"'
        echo 'vpn_image_ocid       = "${{ secrets.TF_VPN_IMAGE_OCID }}"'
        echo 'oke_node_shape       = "${{ secrets.TF_NODE_SHAPE }}"'
        echo 'oke_image_ocid       = "${{ secrets.TF_NODE_IMAGE_OCID }}"'
        echo 'budget_alert_email   = "${{ secrets.TF_BUDGET_EMAIL }}"'
        } > terraform.tfvars
    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -var-file="terraform.tfvars"

    - name: Terraform Apply
      run: terraform apply -auto-approve -var-file="terraform.tfvars"

    - name: Cleanup decoded secrets
      run: rm -f oci_api_key.pem oke_ssh_key.pub vpn_ssh_key.pub vpn_key.pem terraform.tfvars