# Allow all pods within the workflows namespace to communicate with each other.
# Required for: n8n main/worker/webhook → Valkey, worker ↔ main coordination.
# podSelector: {} matches all pods in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: workflows
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
