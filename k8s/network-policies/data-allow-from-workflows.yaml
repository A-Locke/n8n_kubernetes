# Allow only the workflows namespace to reach PostgreSQL on port 5432.
# kubernetes.io/metadata.name is automatically set on all namespaces by K8s 1.21+.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-workflows
  namespace: data
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workflows
      ports:
        - protocol: TCP
          port: 5432
