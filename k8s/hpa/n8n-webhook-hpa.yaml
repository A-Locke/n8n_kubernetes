# HPA for n8n webhook listeners. Base count in values-queue.yaml is reduced to 2.
# Webhook listeners are lightweight (128Mi RAM) so scaling is cheap.
# Scales quickly on burst traffic; slow to scale down to avoid webhook timeouts.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: n8n-webhook-hpa
  namespace: workflows
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-webhook
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0   # scale up immediately on traffic burst
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
