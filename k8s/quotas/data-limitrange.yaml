# LimitRange for the data namespace.
# Database containers (postgres, pgadmin) already define their own resources,
# but this guards against any future additions that forget to do so.
apiVersion: v1
kind: LimitRange
metadata:
  name: data-limitrange
  namespace: data
spec:
  limits:
    - type: Container
      default:
        cpu: 100m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 2Gi
      min:
        cpu: 10m
        memory: 32Mi
