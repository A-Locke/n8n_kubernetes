# LimitRange for the workflows namespace.
# Applies default requests/limits to any container that doesn't specify them,
# preventing pods from being scheduled with unbounded resource consumption.
apiVersion: v1
kind: LimitRange
metadata:
  name: workflows-limitrange
  namespace: workflows
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 4Gi
      min:
        cpu: 50m
        memory: 64Mi
