# Binds the n8n-readonly Role to the ServiceAccount that the
# community-charts/n8n Helm chart creates (named "n8n" in the workflows namespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-readonly-binding
  namespace: workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-readonly
subjects:
  - kind: ServiceAccount
    name: n8n
    namespace: workflows
