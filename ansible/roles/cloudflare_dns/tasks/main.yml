---
# Creates the public A record for n8n-webhook so Telegram/WhatsApp webhooks
# can reach the ingress from the internet. Runs on localhost (no remote host).
- name: Create Cloudflare A record for n8n-webhook
  community.general.cloudflare_dns:
    zone: "{{ domain }}"
    record: "n8n-webhook"
    type: A
    value: "{{ lb_ip }}"
    ttl: 120
    proxied: false
    api_token: "{{ cloudflare_api_token }}"
    state: present
