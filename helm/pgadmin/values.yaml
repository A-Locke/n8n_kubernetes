pgadmin4:
  install: true

  env:
    email: ""
    password: ""

  # configuration files mounted into /pgadmin4
  extraConfig:
    "servers.json": |
      {
        "Servers": {
          "1": {
            "Name": "Postgres (n8n)",
            "Group": "Servers",
            "Host": "postgres-postgresql.data.svc.cluster.local",
            "Port": 5432,
            "MaintenanceDB": "n8n",
            "Username": "n8n",
            "SSLMode": "prefer"
          }
        }
      }

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
    hosts:
      - host: ""
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - ""
        secretName: pgadmin-tls