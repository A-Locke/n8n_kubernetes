# Default values for postgres
# This is a YAML-formatted file.

# ────────────────────────────────────────────────────────────────
# Global settings
# ────────────────────────────────────────────────────────────────
global:
  # Send Bitnami image pulls to GHCR by default
  imageRegistry: ghcr.io
  postgresql:
    auth:
      postgresPassword: ""   # Set via --set or external secret
      username: "n8n"
      password: ""           # Set via --set or external secret
      database: "n8n"

# ────────────────────────────────────────────────────────────────
# PostgreSQL configuration (Bitnami subchart)
# ────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

  # Pull Postgres image from GHCR (no tag = use chart default that exists today)
  image:
    registry: ghcr.io
    repository: bitnami/postgresql
    # tag: "<optional-ghcr-tag>"   # Pin if you want a specific version

  auth:
    postgresPassword: ""      # Set via --set or external secret
    username: "n8n"
    password: ""              # Set via --set or external secret
    database: "n8n"
    existingSecret: ""        # Use existing secret if available
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"

  # Architecture
  architecture: standalone

  # Primary StatefulSet
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "oci-bv"  # OKE Block Volume

    resources:
      limits:
        cpu: 150m
        memory: 512Mi
      requests:
        cpu: 60m
        memory: 256Mi

    # Security context
    podSecurityContext:
      enabled: true
      fsGroup: 1001

    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true

    # Service
    service:
      type: ClusterIP
      ports:
        postgresql: 5432

    # Init DB (idempotent)
    initdb:
      scripts:
        init.sql: |
          -- Create n8n database if it doesn't exist
          SELECT 'CREATE DATABASE n8n' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'n8n')\gexec;

          -- Grant privileges to n8n user
          GRANT ALL PRIVILEGES ON DATABASE n8n TO n8n;

    # (optional) Backups
    backup:
      enabled: false
      cronjob:
        schedule: "0 2 * * *"
        storage:
          size: 8Gi

  # Metrics (optional)
  metrics:
    enabled: false
    image:
      registry: ghcr.io
      repository: bitnami/postgres-exporter
      # tag: "<optional-ghcr-tag>"
    serviceMonitor:
      enabled: false

  # Network policy (optional)
  networkPolicy:
    enabled: false

# ────────────────────────────────────────────────────────────────
# Chart-level misc
# ────────────────────────────────────────────────────────────────
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
