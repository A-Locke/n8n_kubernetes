# --- keep the rest of your file as-is ---

global:
  imageRegistry: ghcr.io     # leave this if you like; we'll override per-image below
  postgresql:
    auth:
      postgresPassword: ""
      username: "n8n"
      password: ""
      database: "n8n"

postgresql:
  enabled: true

  # Force legacy Docker Hub repo (tag you were using previously)
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 15.4.0-debian-11-r45
    pullPolicy: IfNotPresent
    pullSecrets: []          # add a pull secret here if you hit Hub rate limits

  auth:
    postgresPassword: ""
    username: "n8n"
    password: ""
    database: "n8n"
    existingSecret: ""
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"

  architecture: standalone

  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "oci-bv"

    resources:
      limits:
        cpu: 150m
        memory: 512Mi
      requests:
        cpu: 60m
        memory: 256Mi

    podSecurityContext:
      enabled: true
      fsGroup: 1001

    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true

    service:
      type: ClusterIP
      ports:
        postgresql: 5432

    initdb:
      scripts:
        init.sql: |
          SELECT 'CREATE DATABASE n8n' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'n8n')\gexec;
          GRANT ALL PRIVILEGES ON DATABASE n8n TO n8n;

  metrics:
    enabled: false
    # If you ever enable metrics later, also force legacy repo:
    # image:
    #   registry: docker.io
    #   repository: bitnamilegacy/postgres-exporter
    #   tag: 0.14.0-debian-11-r2
