# --- Global settings
global:
  # IMPORTANT: do NOT set a global registry here; leave empty so it doesn't
  # override subchart images.
  imageRegistry: ""     # or delete this key entirely
  postgresql:
    auth:
      postgresPassword: ""   # Set via --set or secret
      username: "n8n"
      password: ""           # Set via --set or secret
      database: "n8n"

# --- Bitnami PostgreSQL subchart
postgresql:
  enabled: true

  # Force Bitnami Legacy on Docker Hub for your exact tag
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 15.4.0-debian-11-r45
    pullPolicy: IfNotPresent
    pullSecrets: []          # add dockerhub-creds here if rate-limited

  auth:
    postgresPassword: ""     # Set via --set or secret
    username: "n8n"
    password: ""             # Set via --set or secret
    database: "n8n"
    existingSecret: ""
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "password"

  architecture: standalone

  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "oci-bv"   # OKE Block Volume

    resources:
      limits:
        cpu: 150m
        memory: 512Mi
      requests:
        cpu: 60m
        memory: 256Mi

    podSecurityContext:
      enabled: true
      fsGroup: 1001

    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true

    service:
      type: ClusterIP
      ports:
        postgresql: 5432

    initdb:
      scripts:
        init.sql: |
          SELECT 'CREATE DATABASE n8n' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'n8n')\gexec;
          GRANT ALL PRIVILEGES ON DATABASE n8n TO n8n;

  # If you ever enable these later, keep them on Docker Hub legacy too:
  # metrics:
  #   enabled: false
  #   image:
  #     registry: docker.io
  #     repository: bitnamilegacy/postgres-exporter
  #     tag: 0.14.0-debian-11-r2
  # volumePermissions:
  #   image:
  #     registry: docker.io
  #     repository: bitnamilegacy/os-shell
  #     tag: 11-debian-11-r77
